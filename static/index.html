<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Indo-Pacific Mining GIS</title>

  <script>window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/";</script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0ece4;
      --panel:     #ffffff;
      --panel2:    #f8fafc;
      --border:    rgba(0,0,0,0.07);
      --border2:   rgba(0,0,0,0.12);
      --text:      #1a1208;
      --text2:     #4a4035;
      --text3:     #9b8f82;
      --accent:    #e07b39;
      --accent2:   #c8562a;
      --pill-bg:   #f1f5f9;
      --pill-hover:#e2e8f0;
      --radius:    10px;
      --sidebar-w: 290px;
      --t:         0.18s ease;
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; background: var(--bg); }

    /* Embed mode — hide sidebar when ?embed=1 */
    body.embed #sidebar { display: none !important; }
    body.embed #cesiumContainer { flex: 1; }
    body.embed #globe-hint { display: none; }
    body.embed #status-badge { display: none; }


    #app { display: flex; height: 100vh; width: 100vw; }

    /* ── Sidebar ─────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--panel);
      display: flex; flex-direction: column; overflow: hidden;
      z-index: 10;
      box-shadow: 4px 0 24px rgba(0,0,0,0.18);
    }

    .sidebar-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(160deg, #fff8f4 0%, #fff 100%);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 3px; }
    .logo-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 15px; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(224,123,57,0.35);
    }
    .logo-text { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
    .logo-sub  { font-size: 10.5px; color: var(--text3); margin-left: 40px; letter-spacing: 0.3px; text-transform: uppercase; }

    .stats-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat { flex: 1; padding: 10px 12px; background: var(--panel); text-align: center; }
    .stat-value { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-label { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.7px; margin-top: 3px; }

    .sidebar-content {
      flex: 1; overflow-y: auto; padding: 14px 14px 20px;
      scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.1) transparent;
    }
    .sidebar-content::-webkit-scrollbar { width: 3px; }
    .sidebar-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }

    .section { margin-bottom: 20px; }
    .section-label {
      font-size: 9.5px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1.1px; margin-bottom: 8px;
    }

    .layer-select-wrap { position: relative; }
    .layer-select-wrap::after {
      content: '▾'; position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); color: var(--text3); pointer-events: none; font-size: 11px;
    }
    select {
      width: 100%; appearance: none; background: var(--panel2);
      border: 1px solid var(--border2); color: var(--text);
      padding: 8px 28px 8px 10px; border-radius: var(--radius);
      font-size: 12px; font-family: inherit; cursor: pointer;
      outline: none; transition: border-color var(--t);
    }
    select:focus, select:hover { border-color: var(--accent); }

    #commodity-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 9px; border-radius: 16px; font-size: 10.5px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent;
      background: var(--pill-bg); color: var(--text2);
      transition: all var(--t); user-select: none; white-space: nowrap;
    }
    .pill:hover { background: var(--pill-hover); color: var(--text); }
    .pill.active {
      background: rgba(224,123,57,0.08);
      color: var(--accent2);
      border-color: rgba(224,123,57,0.3);
    }
    .pill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pill-all {
      background: rgba(224,123,57,0.07);
      color: var(--accent); border-color: rgba(224,123,57,0.2);
      font-weight: 600;
    }
    .pill-all.active {
      background: rgba(224,123,57,0.14);
      border-color: var(--accent);
    }
    .no-commodity { font-size: 11.5px; color: var(--text3); font-style: italic; }

    #legend-items { display: flex; flex-direction: column; gap: 5px; }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--text2); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* ── Globe container ─────────────────────────── */
    #cesiumContainer {
      flex: 1; position: relative;
      background: radial-gradient(ellipse at 55% 48%, #f5f0e8 0%, #ede4d4 40%, #ddd0bc 75%, #cdc0aa 100%);
    }

    /* ── Loading overlay ─────────────────────────── */
    #loading {
      position: absolute; inset: 0; z-index: 100;
      background: rgba(200,216,238,0.75);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      transition: opacity 0.4s; backdrop-filter: blur(4px);
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(224,123,57,0.2);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12.5px; color: #4a6080; letter-spacing: 0.3px; font-weight: 500; }

    /* ── Status badge ────────────────────────────── */
    #status-badge {
      position: absolute; bottom: 18px; right: 18px; z-index: 5;
      background: rgba(255,255,255,0.75); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 18px; padding: 5px 11px;
      font-size: 10.5px; font-family: 'Inter', sans-serif; color: #3d5a7a;
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.4s;
      box-shadow: 0 2px 12px rgba(100,140,200,0.18);
      pointer-events: none;
    }
    .rot-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e; animation: pulse 1.5s ease-in-out infinite;
    }
    .rot-dot.paused { background: #f59e0b; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    /* ── Hint bar at top of globe ────────────────── */
    #globe-hint {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      z-index: 5;
      background: rgba(255,255,255,0.72); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 20px; padding: 6px 16px;
      font-size: 11px; color: #3d5a7a; white-space: nowrap;
      box-shadow: 0 2px 16px rgba(100,140,200,0.2);
      transition: opacity 0.5s;
    }
    #globe-hint.hidden { opacity: 0; pointer-events: none; }

    /* ── Cesium UI overrides ─────────────────────── */
    .cesium-viewer-bottom,
    .cesium-widget-credits,
    .cesium-viewer-toolbar,
    .cesium-viewer-animationContainer,
    .cesium-viewer-timelineContainer,
    .cesium-viewer-fullscreenContainer { display: none !important; }

    .cesium-infoBox {
      font-family: 'Inter', sans-serif !important;
      background: #fff !important;
      border: 1px solid rgba(0,0,0,0.1) !important;
      border-radius: 12px !important;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15) !important;
      top: 16px !important; right: 16px !important;
      width: 260px !important;
    }
    .cesium-infoBox-title {
      background: linear-gradient(135deg, #f0f6ff, #e8f0fb) !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important; font-weight: 600 !important;
      color: #0f172a !important; border-radius: 12px 12px 0 0 !important;
      padding: 10px 14px !important;
    }
    .cesium-infoBox-close {
      color: #94a3b8 !important; font-size: 18px !important;
      background: transparent !important;
    }
    .cesium-selection-wrapper { display: none !important; }
  </style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">⛏</div>
        <span class="logo-text">Mining GIS</span>
      </div>
      <div class="logo-sub">Indo-Pacific Region</div>
    </div>

    <div class="stats-bar">
      <div class="stat"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-value" id="stat-shown">—</div><div class="stat-label">Shown</div></div>
      <div class="stat"><div class="stat-value" id="stat-comms">—</div><div class="stat-label">Types</div></div>
    </div>

    <div class="sidebar-content">
      <div class="section">
        <div class="section-label">Layer</div>
        <div class="layer-select-wrap"><select id="layer-select"></select></div>
      </div>
      <div class="section">
        <div class="section-label">Commodity Filter <span style="font-size:9px;font-weight:400;color:#cbd5e1;margin-left:4px">click to fly</span></div>
        <div id="commodity-pills"></div>
      </div>
      <div class="section">
        <div class="section-label">Legend</div>
        <div id="legend-items"></div>
      </div>
    </div>
  </div>

  <!-- Globe -->
  <div id="cesiumContainer">
    <div id="loading"><div class="spinner"></div><div class="loading-text">Initialising globe…</div></div>
    <div id="globe-hint">🌏 Drag to rotate · Scroll to zoom · Click a commodity to fly there</div>
    <div id="status-badge"><div class="rot-dot" id="rot-dot"></div><span id="rot-label">Auto-rotating</span></div>
  </div>

</div>
<script>
// ── Embed mode (hide sidebar when loaded inside iframe) ───────────────────────
if (new URLSearchParams(window.location.search).get('embed') === '1') {
  document.body.classList.add('embed');
}

// ── Commodity colours ─────────────────────────────────────────────────────────
const KNOWN = {
  "gold":"#F59E0B","copper":"#EA580C","coal":"#6B7280","natural gas":"#38BDF8",
  "oil":"#B45309","iron":"#DC2626","nickel":"#059669","zinc":"#65A30D",
  "lead":"#7C3AED","silver":"#94A3B8","chromium":"#D97706","manganese":"#6D28D9",
  "bauxite":"#EF4444","lithium":"#2563EB","molybdenum":"#16A34A","uranium":"#15803D",
  "tin":"#EC4899","tungsten":"#F97316","platinum":"#9CA3AF","cobalt":"#1D4ED8",
  "phosphate":"#84CC16","potash":"#DB2777",
};
const FB = [
  "#F59E0B","#EA580C","#059669","#2563EB","#7C3AED",
  "#DB2777","#0891B2","#65A30D","#DC2626","#D97706",
  "#6D28D9","#0284C7","#15803D","#9333EA","#CA8A04",
];
let fbIdx = 0;
const dynColors = {};
function ccolor(name) {
  if (!name || name === "Unknown") return "#94A3B8";
  const k = name.toLowerCase().trim();
  if (KNOWN[k]) return KNOWN[k];
  if (!dynColors[name]) dynColors[name] = FB[fbIdx++ % FB.length];
  return dynColors[name];
}

// ── State ─────────────────────────────────────────────────────────────────────
let allComms = [], selComms = new Set(), colorMap = {};
let currentDS = null, geojsonCache = null;
let autoRotate = true, userInteracting = false;

// ── Cesium init ───────────────────────────────────────────────────────────────
Cesium.Ion.defaultAccessToken = "";

const viewer = new Cesium.Viewer("cesiumContainer", {
  animation:                              false,
  baseLayerPicker:                        false,
  fullscreenButton:                       false,
  vrButton:                               false,
  geocoder:                               false,
  homeButton:                             false,
  infoBox:                                true,
  sceneModePicker:                        false,
  selectionIndicator:                     false,
  timeline:                               false,
  navigationHelpButton:                   false,
  navigationInstructionsInitiallyVisible: false,
  terrainProvider: new Cesium.EllipsoidTerrainProvider(),
  skyBox:          false,
  skyAtmosphere:   new Cesium.SkyAtmosphere(),
  contextOptions:  { webgl: { alpha: true } },  // transparent canvas → CSS bg shows through
});

// Basemap: CartoDB Positron via local proxy
viewer.imageryLayers.removeAll();
viewer.imageryLayers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
  url: "http://localhost:8000/tiles/{z}/{x}/{y}",
  maximumLevel: 18,
  credit: new Cesium.Credit("© OpenStreetMap contributors © CARTO", false),
}));


// Globe appearance — transparent canvas so CSS gradient shows through
viewer.scene.backgroundColor            = Cesium.Color.TRANSPARENT;
viewer.scene.globe.baseColor            = Cesium.Color.fromCssColorString("#2d6fa8"); // rich ocean blue
viewer.scene.globe.enableLighting       = false;
viewer.scene.globe.showGroundAtmosphere = true;

// Atmosphere glow ring
viewer.scene.skyAtmosphere.atmosphereLightIntensity  = 10.0;
viewer.scene.skyAtmosphere.hueShift          =  0.05;
viewer.scene.skyAtmosphere.saturationShift   =  0.1;
viewer.scene.skyAtmosphere.brightnessShift   = -0.1;

// Initial camera: full globe view, slight tilt from Indo-Pacific
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(118, 5, 20000000),
  orientation: { heading: 0, pitch: Cesium.Math.toRadians(-75), roll: 0 },
});

// ── Auto-rotation ─────────────────────────────────────────────────────────────
const rotDot   = document.getElementById("rot-dot");
const rotLabel = document.getElementById("rot-label");

viewer.scene.postRender.addEventListener(() => {
  if (autoRotate && !userInteracting) {
    viewer.camera.rotate(Cesium.Cartesian3.UNIT_Z, -0.0007);
  }
});

function pauseRot() {
  autoRotate = false;
  rotDot.classList.add("paused");
  rotLabel.textContent = "Paused";
}
function resumeRot() {
  autoRotate = true;
  rotDot.classList.remove("paused");
  rotLabel.textContent = "Auto-rotating";
}

const evtHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
evtHandler.setInputAction(() => { userInteracting = true;  pauseRot(); }, Cesium.ScreenSpaceEventType.LEFT_DOWN);
evtHandler.setInputAction(() => { userInteracting = true;  pauseRot(); }, Cesium.ScreenSpaceEventType.RIGHT_DOWN);
evtHandler.setInputAction(() => { userInteracting = true;  pauseRot(); }, Cesium.ScreenSpaceEventType.MIDDLE_DOWN);
evtHandler.setInputAction(() => { userInteracting = false; },             Cesium.ScreenSpaceEventType.LEFT_UP);
evtHandler.setInputAction(() => { userInteracting = false; },             Cesium.ScreenSpaceEventType.RIGHT_UP);
evtHandler.setInputAction(() => { userInteracting = false; },             Cesium.ScreenSpaceEventType.MIDDLE_UP);

// ── App init ──────────────────────────────────────────────────────────────────
async function initApp() {
  const layers = await fetch("/api/layers").then(r => r.json());
  const sel = document.getElementById("layer-select");
  layers.forEach(l => {
    const o = document.createElement("option");
    o.value = o.textContent = l;
    sel.appendChild(o);
  });
  sel.addEventListener("change", () => loadLayer(sel.value));
  showLoading(false);
  if (layers.length) loadLayer(layers[0]);

  // Hide hint after 6 seconds
  setTimeout(() => document.getElementById("globe-hint").classList.add("hidden"), 6000);
}

// ── Load layer ────────────────────────────────────────────────────────────────
async function loadLayer(name) {
  showLoading(true);
  selComms.clear(); fbIdx = 0;
  Object.keys(dynColors).forEach(k => delete dynColors[k]);

  if (currentDS) { viewer.dataSources.remove(currentDS, true); currentDS = null; }

  const [gj, comms] = await Promise.all([
    fetch(`/api/layers/${encodeURIComponent(name)}/geojson`).then(r => r.json()),
    fetch(`/api/layers/${encodeURIComponent(name)}/commodities`).then(r => r.json()),
  ]);

  geojsonCache = gj;
  allComms = comms;
  colorMap = {};
  comms.forEach(c => { colorMap[c] = ccolor(c); });
  comms.forEach(c => selComms.add(c));

  currentDS = await buildDataSource(gj, name);
  viewer.dataSources.add(currentDS);

  renderPills();
  updateStats();
  showLoading(false);
  // Do NOT fly on layer load — keep full globe view
  resumeRot();
}

// ── Build data source ─────────────────────────────────────────────────────────
async function buildDataSource(gj, layerName) {
  const ds = await Cesium.GeoJsonDataSource.load(gj, { clampToGround: true });

  ds.entities.values.forEach(entity => {
    const props     = entity.properties;
    const commodity = props._primary_commodity?.getValue() || "Unknown";
    const hex       = ccolor(commodity);
    const cesColor  = Cesium.Color.fromCssColorString(hex);

    if (entity.billboard) {
      entity.billboard = undefined;
      entity.point = new Cesium.PointGraphics({
        pixelSize:    8,
        color:        cesColor,
        outlineColor: Cesium.Color.WHITE.withAlpha(0.9),
        outlineWidth: 1.5,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
        scaleByDistance: new Cesium.NearFarScalar(1e4, 1.5, 1e7, 0.5),
      });
    }

    if (entity.polygon) {
      entity.polygon.material     = cesColor.withAlpha(0.5);
      entity.polygon.outline      = true;
      entity.polygon.outlineColor = Cesium.Color.WHITE.withAlpha(0.4);
      entity.polygon.outlineWidth = 1;
    }

    const siteName = props._name?.getValue()            || "";
    const country  = props._country?.getValue()         || "";
    const minerals = props._all_commodities?.getValue() || "";
    entity.name        = siteName || commodity;
    entity.description = buildDescription(siteName, country, minerals, hex);
  });

  return ds;
}

function buildDescription(name, country, minerals, hex) {
  let h = `<div style="font-family:'Inter',sans-serif;padding:12px 14px;font-size:12px;color:#334155">`;
  if (name && name !== "nan")
    h += `<div style="font-size:13px;font-weight:600;color:#0f172a;margin-bottom:8px;line-height:1.3">${name}</div>`;
  if (country && country !== "nan")
    h += `<div style="margin-bottom:5px"><span style="color:#94a3b8;font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Country </span>${country}</div>`;
  if (minerals) {
    const chips = minerals.split(", ").filter(Boolean).map(m =>
      `<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:500;margin:2px 2px 0 0;background:${ccolor(m)}18;color:${ccolor(m)};border:1px solid ${ccolor(m)}44">${m}</span>`
    ).join("");
    h += `<div style="margin-top:6px"><span style="color:#94a3b8;font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:block;margin-bottom:5px">Minerals</span>${chips}</div>`;
  }
  h += `</div>`;
  return h;
}

// ── Filter & fly ──────────────────────────────────────────────────────────────
function applyFilter() {
  if (!currentDS) return;
  currentDS.entities.values.forEach(entity => {
    const c = entity.properties._primary_commodity?.getValue() || "Unknown";
    entity.show = allComms.length === 0 || selComms.has(c);
  });
  updateStats();
  renderLegend();
}

function flyToSelected() {
  if (!currentDS) return;
  const visible = currentDS.entities.values.filter(e => e.show);
  if (!visible.length) return;

  // Collect point positions
  const positions = visible
    .filter(e => e.position)
    .map(e => e.position.getValue(Cesium.JulianDate.now()))
    .filter(Boolean);

  if (positions.length) {
    const sphere = Cesium.BoundingSphere.fromPoints(positions);
    const range  = Math.max(sphere.radius * 3.5, 1500000);
    viewer.camera.flyToBoundingSphere(sphere, {
      offset:   new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-50), range),
      duration: 2.0,
    });
  } else {
    // Polygon layers — use flyTo
    viewer.flyTo(currentDS, {
      offset:   new Cesium.HeadingPitchRange(0, Cesium.Math.toRadians(-50), 8000000),
      duration: 2.0,
    }).catch(() => {});
  }
}

function resetGlobeView() {
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(118, 5, 20000000),
    orientation: { heading: 0, pitch: Cesium.Math.toRadians(-75), roll: 0 },
    duration: 1.5,
  });
}

// ── Pills ─────────────────────────────────────────────────────────────────────
function renderPills() {
  const box = document.getElementById("commodity-pills");
  box.innerHTML = "";
  if (!allComms.length) { box.innerHTML = `<span class="no-commodity">No commodity data for this layer</span>`; return; }

  const allPill = pill("All", null, true);
  allPill.classList.add("pill-all");
  const allSelected = selComms.size === allComms.length;
  if (allSelected) allPill.classList.add("active");
  allPill.onclick = () => {
    if (selComms.size === allComms.length) selComms.clear();
    else allComms.forEach(c => selComms.add(c));
    renderPills(); applyFilter();
    if (selComms.size === allComms.length) { resumeRot(); resetGlobeView(); }
    else pauseRot();
  };
  box.appendChild(allPill);

  allComms.forEach(c => {
    const p = pill(c, ccolor(c), false);
    if (selComms.has(c)) p.classList.add("active");
    p.onclick = () => {
      // Single-select behaviour: clicking a commodity zooms to ONLY that one
      const wasSolo = selComms.size === 1 && selComms.has(c);
      if (wasSolo) {
        // Deselect → back to all
        allComms.forEach(x => selComms.add(x));
        renderPills(); applyFilter(); resumeRot(); resetGlobeView();
      } else {
        // Select only this commodity and fly to it
        selComms.clear();
        selComms.add(c);
        renderPills(); applyFilter(); pauseRot();
        flyToSelected();
      }
    };
    box.appendChild(p);
  });
}

function pill(label, color, isAll) {
  const p = document.createElement("div"); p.className = "pill";
  if (!isAll && color) {
    const d = document.createElement("span"); d.className = "pill-dot"; d.style.background = color; p.appendChild(d);
  }
  const t = document.createElement("span"); t.textContent = label; p.appendChild(t);
  return p;
}

// ── Legend ────────────────────────────────────────────────────────────────────
function renderLegend() {
  const box = document.getElementById("legend-items");
  box.innerHTML = "";
  [...selComms].sort().forEach(c => {
    const r = document.createElement("div"); r.className = "legend-row";
    r.innerHTML = `<span class="legend-dot" style="background:${colorMap[c]||'#94A3B8'}"></span><span>${c}</span>`;
    box.appendChild(r);
  });
  if (!selComms.size) box.innerHTML = `<span class="no-commodity">No commodities selected</span>`;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const total = geojsonCache?.features?.length ?? 0;
  const shown = currentDS ? currentDS.entities.values.filter(e => e.show).length : 0;
  document.getElementById("stat-total").textContent = total.toLocaleString();
  document.getElementById("stat-shown").textContent = shown.toLocaleString();
  document.getElementById("stat-comms").textContent = selComms.size || "—";
}

function showLoading(v) { document.getElementById("loading").classList.toggle("hidden", !v); }

// ── Start ─────────────────────────────────────────────────────────────────────
initApp();
</script>
</body>
</html>
